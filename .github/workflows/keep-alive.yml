name: Keep Alive Front

on:
  schedule:
    - cron: "*/10 * * * *" # cada 10 minutos
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping frontend health
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://www.kamecol.com/health)
          echo "Status: $STATUS"
          test "$STATUS" = "200"