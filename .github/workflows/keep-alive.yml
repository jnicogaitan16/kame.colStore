name: Keep Alive Front

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake up frontend
        run: |
          echo "Waking frontend..."
          curl -L --silent --show-error --output /dev/null https://www.kamecol.com/ || true

      - name: Wait for service startup
        run: sleep 45

      - name: Verify frontend health
        run: |
          echo "Verifying frontend..."
          STATUS=$(curl -L --silent --show-error --output /dev/null --write-out "%{http_code}" https://www.kamecol.com/health)
          echo "Status: $STATUS"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Error: frontend did not respond successfully"
            exit 1
          fi
