name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Ejecutar a mano desde Actions → E2E Tests → Run workflow (sin commits de relleno).
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            tests/package.json

      # Build Next.js
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install test deps
        working-directory: tests
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Start mock backend for build
        working-directory: tests
        run: |
          node e2e/fixtures/mock-backend.mjs &
          echo $! > /tmp/mock-backend.pid
          sleep 2
          curl -sf http://localhost:3001/health || (echo "Mock backend failed to start" && exit 1)
          echo "Mock backend ready on :3001"

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_WHATSAPP_PHONE: "573137000000"
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          DJANGO_API_BASE: http://localhost:3001
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: pub_test_e2e_placeholder

      - name: Stop mock backend
        if: always()
        run: |
          if [ -f /tmp/mock-backend.pid ]; then
            kill $(cat /tmp/mock-backend.pid) 2>/dev/null || true
            rm /tmp/mock-backend.pid
          fi

      # Playwright: con caché de ~/.cache/ms-playwright solo basta install chromium (evita apt en cada run).
      - name: Install Playwright browsers
        working-directory: tests
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run E2E tests
        working-directory: tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: tests/test-results/
          retention-days: 3

  # Wompi Nequi contra Next+Django reales (no mock). Solo en push a `main` (p. ej. tras merge),
  # después del job Playwright E2E. Requiere secret `E2E_SANDBOX_BASE_URL` (URL del storefront desplegado).
  e2e-wompi-nequi-sandbox:
    name: Playwright Wompi Nequi (sandbox)
    runs-on: ubuntu-latest
    needs: e2e
    # `secrets` no está permitido en `jobs.<id>.if`; el filtro por URL va en el paso "Guard".
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 25

    steps:
      - name: Guard (require E2E_SANDBOX_BASE_URL)
        id: sandbox-guard
        env:
          SANDBOX_BASE_URL: ${{ secrets.E2E_SANDBOX_BASE_URL }}
        run: |
          if [ -z "$SANDBOX_BASE_URL" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E_SANDBOX_BASE_URL no configurado; se omite el E2E sandbox Wompi."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.sandbox-guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.sandbox-guard.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install test deps
        if: steps.sandbox-guard.outputs.run == 'true'
        working-directory: tests
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.sandbox-guard.outputs.run == 'true'
        id: playwright-sandbox-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-sandbox-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: |
            playwright-sandbox-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.sandbox-guard.outputs.run == 'true'
        working-directory: tests
        run: |
          if [ "${{ steps.playwright-sandbox-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run Wompi Nequi sandbox E2E
        if: steps.sandbox-guard.outputs.run == 'true'
        working-directory: tests
        run: npx playwright test -c playwright.sandbox.config.ts
        env:
          CI: true
          RUN_WOMPI_SANDBOX_E2E: "1"
          SANDBOX_BASE_URL: ${{ secrets.E2E_SANDBOX_BASE_URL }}
          E2E_SKIP_LOAD_FRONTEND_ENV: "1"
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${{ secrets.E2E_SANDBOX_WOMPI_PUBLIC_KEY }}
          E2E_PLAYWRIGHT_DISABLE_GPU: "1"

      - name: Upload Playwright sandbox report
        uses: actions/upload-artifact@v4
        if: always() && steps.sandbox-guard.outputs.run == 'true'
        with:
          name: playwright-sandbox-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload sandbox test results
        uses: actions/upload-artifact@v4
        if: failure() && steps.sandbox-guard.outputs.run == 'true'
        with:
          name: playwright-sandbox-results
          path: tests/test-results/
          retention-days: 3
