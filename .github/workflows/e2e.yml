name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            tests/package.json

      # Build Next.js
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install test deps
        working-directory: tests
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Start mock backend for build
        working-directory: tests
        run: |
          node e2e/fixtures/mock-backend.mjs &
          echo $! > /tmp/mock-backend.pid
          sleep 2
          curl -sf http://localhost:3001/health || (echo "Mock backend failed to start" && exit 1)
          echo "Mock backend ready on :3001"

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_WHATSAPP_PHONE: "573137000000"
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          DJANGO_API_BASE: http://localhost:3001
          NEXT_PUBLIC_WOMPI_PUBLIC_KEY: pub_test_e2e_placeholder

      - name: Stop mock backend
        if: always()
        run: |
          if [ -f /tmp/mock-backend.pid ]; then
            kill $(cat /tmp/mock-backend.pid) 2>/dev/null || true
            rm /tmp/mock-backend.pid
          fi

      # Playwright: con caché de ~/.cache/ms-playwright solo basta install chromium (evita apt en cada run).
      - name: Install Playwright browsers
        working-directory: tests
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run E2E tests
        working-directory: tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: tests/test-results/
          retention-days: 3
